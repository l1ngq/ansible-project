---
- name: Update cache (Debian)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"
  tags: cache

- name: Update dnf cache (RedHat)
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_facts['os_family'] == "RedHat"
  tags: cache

- name: Install packages
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present
  tags: packages

- name: Set timezone
  community.general.timezone:
    name: "{{ time_zone }}"
    hwclock: UTC
  tags: timezone

- name: Create user
  ansible.builtin.user:
    name: "{{ username }}"
    state: present
    shell: /bin/bash
    create_home: true
  tags: user

- name: Add user to sudo group (Debian)
  ansible.builtin.user:
    name: "{{ username }}"
    groups: sudo
    append: true
  when: ansible_facts['os_family'] == "Debian"
  tags: user

- name: Add user to wheel group (RedHat)
  ansible.builtin.user:
    name: "{{ username }}"
    groups: wheel
    append: true
  when: ansible_facts['os_family'] == "RedHat"
  tags: user

- name: Ssh key for user
  ansible.posix.authorized_key:
    user: "{{ username }}"
    state: present
    key: "{{ ssh_key }}"
  tags: ssh_key

- name: Disable password authentication for sshd
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
    backup: true
  notify: Restart sshd
  tags: sshd

- name: Disable root ssh login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
    backup: true
  notify: Restart sshd
  tags: sshd

- name: Ufw allow rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: 22, proto: tcp }
    - { port: 80, proto: tcp }
    - { port: 443, proto: tcp }
    - { port: 9100, proto: tcp }
  when: ansible_facts['os_family'] == "Debian"
  tags: ufw

- name: Ufw configuration
  community.general.ufw:
    state: enabled
    policy: deny
  when: ansible_facts['os_family'] == "Debian"
  tags: ufw
